<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility Team Master v10</title>
    <style>
        :root { --posco-blue: #004b91; --bg: #f4f7fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background-color: var(--posco-blue); color: white; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1001; }
        .calendar-section { max-width: 1600px; margin: 15px auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #eee; border: 1px solid #eee; }
        .cal-day-label { background: #f8f9fa; padding: 5px; text-align: center; font-size: 0.75rem; font-weight: bold; }
        .cal-cell { background: white; min-height: 80px; padding: 5px; font-size: 0.65rem; position: relative; border: 1px solid #f9f9f9; }
        .cal-cell .day-num { font-weight: bold; margin-bottom: 3px; display: block; }
        .cal-event { font-size: 0.65rem; padding: 1px 3px; border-radius: 2px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; }
        .summary-container { max-width: 1600px; margin: 0 auto 15px; display: flex; gap: 15px; padding: 0 20px; }
        .summary-box { flex: 1; background: #fffbe6; border: 2px solid #ffe58f; padding: 12px; border-radius: 8px; }
        .summary-title { font-weight: 800; color: #856404; margin-bottom: 8px; font-size: 0.85rem; border-bottom: 1px solid #ffe58f; padding-bottom: 4px; }
        .container { display: flex; gap: 15px; padding: 0 20px; max-width: 1600px; margin: 0 auto; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .column-header { background: #fff; padding: 12px; border-radius: 8px; text-align: center; font-weight: 800; color: var(--posco-blue); border-bottom: 4px solid var(--posco-blue); font-size: 0.95rem; }
        .eng-card { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .color-0 { border-left: 5px solid #e74c3c; } .color-1 { border-left: 5px solid #f39c12; }
        .color-2 { border-left: 5px solid #27ae60; } .color-3 { border-left: 5px solid #2980b9; }
        .color-4 { border-left: 5px solid #8e44ad; }
        .input-area { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .input-row { display: flex; gap: 4px; }
        select, input { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.8rem; }
        .add-btn { background: var(--posco-blue); color: white; padding: 8px; font-size: 0.8rem; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; width: 100%; }
        .activity-item { display: flex; flex-direction: column; padding: 8px; margin-bottom: 6px; background: #fafafa; border-radius: 5px; border: 1px solid #eee; }
        .activity-item.done { opacity: 0.5; background: #e9ecef; }
        .item-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .tag { font-size: 0.65rem; padding: 1px 5px; border-radius: 3px; font-weight: bold; }
        .tag-중요 { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; }
        .tag-일상 { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
        .tag-회의 { background: #e6f7ff; color: #096dd9; border: 1px solid #91d5ff; }
        .tag-이벤트 { background: #fff7e6; color: #d46b08; border: 1px solid #ffd591; }
        .tag-휴가 { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }
        .item-content { font-size: 0.85rem; flex: 1; font-weight: 500; }
        .item-bottom { display: flex; justify-content: space-between; align-items: center; }
        .item-date-range { font-size: 0.7rem; color: #666; }
        .item-actions { display: flex; gap: 3px; }
        .btn-sm { font-size: 0.65rem; padding: 2px 5px; cursor: pointer; border: none; border-radius: 3px; }
        .summary-item { margin-bottom: 4px; border-bottom: 1px dashed #ffe58f; padding-bottom: 2px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .sum-tag { font-size: 0.6rem; padding: 0 3px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900;">POSCO E&C <span style="font-weight: 300;">Utility Team Master v10</span></div>
    <div id="clock" style="font-size: 0.8rem;"></div>
</header>

<div class="calendar-section">
    <div class="cal-header">
        <button onclick="changeMonth(-1)">◀</button>
        <span id="cal-month-title"></span>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="summary-container">
    <div class="summary-box">
        <div class="summary-title">🚩 진행 중인 주요 Activity (중요/이벤트)</div>
        <div id="summary-active" class="summary-list">불러오는 중...</div>
    </div>
</div>

<div class="container">
    <div class="column"><div class="column-header">THIS WEEK (<span id="range-this"></span>)</div><div id="left-panels"></div></div>
    <div class="column"><div class="column-header" style="border-color:#555; color:#555;">NEXT WEEK (<span id="range-next"></span>)</div><div id="right-panels"></div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC8KlvV_-8d1BduBbGt9tlbNHLcrf5Pgok",
        authDomain: "utility-and-piping.firebaseapp.com",
        projectId: "utility-and-piping",
        storageBucket: "utility-and-piping.firebasestorage.app",
        messagingSenderId: "16501716680",
        appId: "1:16501716680:web:99acafc9c531f1f46197fd",
        measurementId: "G-8VYRBXZ8DQ",
        databaseURL: "https://utility-and-piping-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const activitiesRef = ref(db, 'activities');

    const managers = ["조갑수", "전해석", "박일경", "조래혁", "김형진"];
    const mColors = ["#e74c3c", "#f39c12", "#27ae60", "#2980b9", "#8e44ad"];
    const categories = ["중요", "일상", "회의", "이벤트", "휴가"];
    
    let activities = [];
    let curDate = new Date();

    window.onload = () => {
        setWeekRanges();
        renderPanels('left-panels', 'TW');
        renderPanels('right-panels', 'NW');
        onValue(activitiesRef, (snapshot) => {
            const data = snapshot.val();
            activities = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            refreshUI();
        });
    };

    function setWeekRanges() {
        const now = new Date();
        const day = now.getDay();
        const monThis = new Date(now); monThis.setDate(now.getDate() - (day === 0 ? 6 : day - 1)); monThis.setHours(0,0,0,0);
        const monNext = new Date(monThis); monNext.setDate(monThis.getDate() + 7);
        const f = (d) => `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
        document.getElementById('range-this').innerText = `${f(monThis)} ~ ${f(new Date(monThis.getTime() + 4*86400000))}`;
        document.getElementById('range-next').innerText = `${f(monNext)} ~ ${f(new Date(monNext.getTime() + 4*86400000))}`;
    }

    function renderPanels(containerId, prefix) {
        const container = document.getElementById(containerId);
        managers.forEach((name, i) => {
            const div = document.createElement('div');
            div.className = `eng-card color-${i}`;
            div.innerHTML = `
                <h3 style="margin:0 0 8px 0; font-size:0.85rem">${name}</h3>
                <div class="input-area">
                    <div class="input-row">
                        <select id="cat-${prefix}-${i}" style="flex:1">${categories.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
                        <input type="text" id="txt-${prefix}-${i}" placeholder="업무 내용" style="flex:3">
                    </div>
                    <div class="input-row">
                        <input type="date" id="start-${prefix}-${i}" style="flex:1" title="시작일">
                        <input type="date" id="end-${prefix}-${i}" style="flex:1" title="완료일">
                    </div>
                    <button class="add-btn" onclick="addActivity('${prefix}', ${i})">등록</button>
                </div>
                <div id="list-${prefix}-${i}"></div>`;
            container.appendChild(div);
        });
    }

    window.addActivity = (prefix, idx) => {
        const cat = document.getElementById(`cat-${prefix}-${idx}`).value;
        const txt = document.getElementById(`txt-${prefix}-${idx}`).value;
        const start = document.getElementById(`start-${prefix}-${idx}`).value;
        const end = document.getElementById(`end-${prefix}-${idx}`).value;
        if (!txt || !start || !end) { alert("모든 항목을 입력해주세요!"); return; }
        
        push(activitiesRef, { 
            manager: managers[idx], category: cat, content: txt, 
            startDate: start, dueDate: end, status: 'active', timestamp: Date.now() 
        }).then(() => { document.getElementById(`txt-${prefix}-${idx}`).value = ""; });
    };

    function refreshUI() {
        document.querySelectorAll('[id^="list-"]').forEach(l => l.innerHTML = "");
        let summaryHtml = "";
        const todayStr = new Date().toISOString().split('T')[0];
        const monThis = new Date(); monThis.setDate(monThis.getDate() - (monThis.getDay() === 0 ? 6 : monThis.getDay() - 1)); monThis.setHours(0,0,0,0);
        const monNext = new Date(monThis); monNext.setDate(monThis.getDate() + 7);

        activities.sort((a,b) => new Date(a.startDate) - new Date(b.startDate)).forEach(act => {
            const mIdx = managers.indexOf(act.manager);
            const start = new Date(act.startDate);
            const end = new Date(act.dueDate);

            // 중요/이벤트 노출 로직: 시작일이 지났고 미완료인 경우 상단 리스트 유지
            if ((act.category === '중요' || act.category === '이벤트') && act.status === 'active') {
                if (act.startDate <= todayStr) {
                    summaryHtml += `<div class="summary-item">
                        <span><span class="tag sum-tag tag-${act.category}">${act.category}</span><b>[${act.manager}]</b> ${act.content}</span> 
                        <span style="color:#888; font-size:0.7rem">${act.startDate.slice(5)} ~ ${act.dueDate.slice(5)}</span>
                    </div>`;
                }
            }

            if (end >= monThis && end < monNext) createItem('TW', mIdx, act);
            else if (end >= monNext) createItem('NW', mIdx, act);
        });
        document.getElementById('summary-active').innerHTML = summaryHtml || "현재 진행 중인 주요 항목이 없습니다.";
        renderCalendar();
    }

    function createItem(prefix, mIdx, act) {
        const list = document.getElementById(`list-${prefix}-${mIdx}`);
        const item = document.createElement('div');
        item.className = `activity-item ${act.status === 'done' ? 'done' : ''}`;
        item.innerHTML = `
            <div class="item-top">
                <span class="tag tag-${act.category}">${act.category}</span>
                <span class="item-content">${act.content}</span>
            </div>
            <div class="item-bottom">
                <span class="item-date-range">${act.startDate.slice(5)} ~ ${act.dueDate.slice(5)}</span>
                <div class="item-actions">
                    <button class="btn-sm" style="background:#004b91; color:white;" onclick="editItem('${act.id}')">수정</button>
                    <button class="btn-sm" style="background:#52c41a; color:white;" onclick="toggleStatus('${act.id}', '${act.status}')">${act.status==='done'?'복구':'완료'}</button>
                    <button class="btn-sm" style="background:#ff4d4f; color:white;" onclick="deleteItem('${act.id}')">삭제</button>
                </div>
            </div>`;
        list.appendChild(item);
    }

    window.toggleStatus = (id, cur) => update(ref(db, `activities/${id}`), { status: cur === 'done' ? 'active' : 'done' });
    window.deleteItem = (id) => { if(confirm("삭제하시겠습니까?")) remove(ref(db, `activities/${id}`)); };
    
    window.editItem = (id) => {
        const act = activities.find(a => a.id === id);
        const newTxt = prompt("업무 내용을 수정하세요:", act.content);
        const newStart = prompt("시작일을 수정하세요 (YYYY-MM-DD):", act.startDate);
        const newEnd = prompt("완료일을 수정하세요 (YYYY-MM-DD):", act.dueDate);
        if(newTxt && newStart && newEnd) {
            update(ref(db, `activities/${id}`), { content: newTxt, startDate: newStart, dueDate: newEnd });
        }
    };

    function renderCalendar() {
        const grid = document.getElementById('cal-grid'); grid.innerHTML = "";
        const labels = ["일","월","화","수","목","금","토"];
        labels.forEach(l => grid.innerHTML += `<div class="cal-day-label">${l}</div>`);
        const year = curDate.getFullYear(); const month = curDate.getMonth();
        document.getElementById('cal-month-title').innerText = `${year}.${String(month+1).padStart(2,'0')}`;
        const firstDay = new Date(year, month, 1).getDay(); const lastDate = new Date(year, month + 1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="cal-cell"></div>`;
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let eventsHtml = "";
            activities.filter(a => dateStr >= a.startDate && dateStr <= a.dueDate).forEach(a => {
                eventsHtml += `<div class="cal-event" style="background:${mColors[managers.indexOf(a.manager)]}">${a.manager}:${a.content}</div>`;
            });
            grid.innerHTML += `<div class="cal-cell"><span class="day-num">${d}</span>${eventsHtml}</div>`;
        }
    }

    window.changeMonth = (v) => { curDate.setMonth(curDate.getMonth() + v); refreshUI(); };
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
